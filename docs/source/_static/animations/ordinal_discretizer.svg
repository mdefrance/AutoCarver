<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340"
     width="800" height="340" role="img"
     aria-label="AutoCarver discretizer animation">
  <defs>
    <pattern id="nan-hatch" patternUnits="userSpaceOnUse" width="6" height="6"
             patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#e5e7eb"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#5D7092" stroke-width="1.2"/>
    </pattern>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#f97316"/>
    </marker>
  </defs>
  <style>
text { font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
.title { font-size: 14px; font-weight: 600; fill: #111827; }
.callout { font-size: 11px; fill: #4b5563; }
.chip { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; fill: #f9fafb; }
.binlabel { font-size: 10px; fill: #374151; }
.binlabel-rot { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; fill: #374151; }
.tick-label { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 9px; fill: #6b7280; }
.overrep-label { font-size: 11px; fill: #c2410c; font-weight: 600; }
.merge-label { font-size: 9px; fill: #c2410c; font-weight: 600; }
.strip-label { font-size: 9px; fill: #6b7280; font-style: italic; }
.threshold-label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px; fill: #ef4444; font-weight: 600;
}

@keyframes show-0 {
  0% { opacity: 1; }
  22.75% { opacity: 1; }
  25.00% { opacity: 0; }
  100% { opacity: 0; }
}
.stage-0 { opacity: 0; animation: show-0 20000ms infinite; }
@keyframes show-1 {
  0% { opacity: 0; }
  25.00% { opacity: 0; }
  27.25% { opacity: 1; }
  47.75% { opacity: 1; }
  50.00% { opacity: 0; }
  100% { opacity: 0; }
}
.stage-1 { opacity: 0; animation: show-1 20000ms infinite; }
@keyframes show-2 {
  0% { opacity: 0; }
  50.00% { opacity: 0; }
  52.25% { opacity: 1; }
  100% { opacity: 1; }
}
.stage-2 { opacity: 0; animation: show-2 20000ms infinite; }
.stage-3 { display: none; }
.stage-4 { display: none; }
  </style>
  <g class="stage stage-0">
    <text class="title" x="400.00" y="29.00" text-anchor="middle">Stage 0 / 2 &#8212; Raw feature</text>
    <rect x="658" y="12" width="110" height="22" rx="11" fill="#111827"/>
    <text class="chip" x="713.00" y="27.00" text-anchor="middle">—</text>
    <text class="callout" x="400.00" y="56.00" text-anchor="middle">Raw ordinal AgeGroup (synthetic, n=1500). Bars in declared order; dots = P(y=1). Rare</text>
    <text class="callout" x="400.00" y="70.00" text-anchor="middle">modalities outlined orange.</text>
    <rect x="32.50" y="224.15" width="133.00" height="23.85" rx="2" fill="#5B8FF9" stroke="#374151" stroke-width="0.6"/>
    <text class="binlabel-rot" x="99.00" y="256.00" text-anchor="end" transform="rotate(-45 99.00 256.00)">child</text>
    <rect x="166.50" y="238.54" width="133.00" height="9.46" rx="2" fill="#5AD8A6" stroke="#f97316" stroke-width="2.0"/>
    <text class="binlabel-rot" x="233.00" y="256.00" text-anchor="end" transform="rotate(-45 233.00 256.00)">teen</text>
    <rect x="300.50" y="161.52" width="133.00" height="86.48" rx="2" fill="#F6BD16" stroke="#374151" stroke-width="0.6"/>
    <text class="binlabel-rot" x="367.00" y="256.00" text-anchor="end" transform="rotate(-45 367.00 256.00)">adult</text>
    <rect x="434.50" y="181.26" width="133.00" height="66.74" rx="2" fill="#E8684A" stroke="#374151" stroke-width="0.6"/>
    <text class="binlabel-rot" x="501.00" y="256.00" text-anchor="end" transform="rotate(-45 501.00 256.00)">middle_aged</text>
    <rect x="568.50" y="241.01" width="133.00" height="6.99" rx="2" fill="#6DC8EC" stroke="#f97316" stroke-width="2.0"/>
    <text class="binlabel-rot" x="635.00" y="256.00" text-anchor="end" transform="rotate(-45 635.00 256.00)">elderly</text>
    <path d="M 99.00,140.00 L 233.00,107.64 L 367.00,124.57 L 501.00,117.16 L 635.00,100.00" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2 3"/>
    <circle cx="99.00" cy="140.00" r="3.5" fill="#5B8FF9" stroke="#374151" stroke-width="0.6"/>
    <circle cx="233.00" cy="107.64" r="3.5" fill="#5AD8A6" stroke="#374151" stroke-width="0.6"/>
    <circle cx="367.00" cy="124.57" r="3.5" fill="#F6BD16" stroke="#374151" stroke-width="0.6"/>
    <circle cx="501.00" cy="117.16" r="3.5" fill="#E8684A" stroke="#374151" stroke-width="0.6"/>
    <circle cx="635.00" cy="100.00" r="3.5" fill="#6DC8EC" stroke="#374151" stroke-width="0.6"/>
    <text class="strip-label" x="32.00" y="96.00" text-anchor="start">target rate &#8712; [0.02, 0.99]</text>
    <rect x="712.00" y="235.94" width="56.00" height="12.06" rx="3" fill="url(#nan-hatch)" stroke="#5D7092" stroke-width="1" opacity="0.85"/>
    <text class="binlabel-rot" x="740.00" y="256.00" text-anchor="end" transform="rotate(-45 740.00 256.00)">NaN (5.9%)</text>
    <line x1="32" y1="248.00" x2="702" y2="248.00" stroke="#9ca3af" stroke-width="1"/>
    <line x1="32" y1="233.61" x2="768" y2="233.61" stroke="#ef4444" stroke-width="1" stroke-dasharray="5 3"/>
    <text class="threshold-label" x="764.00" y="229.61" text-anchor="end">min_freq = 0.07</text>
  </g>
  <g class="stage stage-1">
    <text class="title" x="400.00" y="29.00" text-anchor="middle">Stage 1 / 2 &#8212; Merge direction chosen</text>
    <rect x="658" y="12" width="110" height="22" rx="11" fill="#111827"/>
    <text class="chip" x="713.00" y="27.00" text-anchor="middle">—</text>
    <text class="callout" x="400.00" y="56.00" text-anchor="middle">Each rare modality merges with the adjacent neighbour whose target rate is closest (or its</text>
    <text class="callout" x="400.00" y="70.00" text-anchor="middle">only neighbour at the edges).</text>
    <rect x="32.50" y="224.15" width="133.00" height="23.85" rx="2" fill="#5B8FF9" stroke="#374151" stroke-width="0.6"/>
    <text class="binlabel-rot" x="99.00" y="256.00" text-anchor="end" transform="rotate(-45 99.00 256.00)">child</text>
    <rect x="166.50" y="238.54" width="133.00" height="9.46" rx="2" fill="#5AD8A6" stroke="#f97316" stroke-width="2.0"/>
    <text class="binlabel-rot" x="233.00" y="256.00" text-anchor="end" transform="rotate(-45 233.00 256.00)">teen</text>
    <rect x="300.50" y="161.52" width="133.00" height="86.48" rx="2" fill="#F6BD16" stroke="#374151" stroke-width="0.6"/>
    <text class="binlabel-rot" x="367.00" y="256.00" text-anchor="end" transform="rotate(-45 367.00 256.00)">adult</text>
    <rect x="434.50" y="181.26" width="133.00" height="66.74" rx="2" fill="#E8684A" stroke="#374151" stroke-width="0.6"/>
    <text class="binlabel-rot" x="501.00" y="256.00" text-anchor="end" transform="rotate(-45 501.00 256.00)">middle_aged</text>
    <rect x="568.50" y="241.01" width="133.00" height="6.99" rx="2" fill="#6DC8EC" stroke="#f97316" stroke-width="2.0"/>
    <text class="binlabel-rot" x="635.00" y="256.00" text-anchor="end" transform="rotate(-45 635.00 256.00)">elderly</text>
    <path d="M 99.00,140.00 L 233.00,107.64 L 367.00,124.57 L 501.00,117.16 L 635.00,100.00" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2 3"/>
    <circle cx="99.00" cy="140.00" r="3.5" fill="#5B8FF9" stroke="#374151" stroke-width="0.6"/>
    <circle cx="233.00" cy="107.64" r="3.5" fill="#5AD8A6" stroke="#374151" stroke-width="0.6"/>
    <circle cx="367.00" cy="124.57" r="3.5" fill="#F6BD16" stroke="#374151" stroke-width="0.6"/>
    <circle cx="501.00" cy="117.16" r="3.5" fill="#E8684A" stroke="#374151" stroke-width="0.6"/>
    <circle cx="635.00" cy="100.00" r="3.5" fill="#6DC8EC" stroke="#374151" stroke-width="0.6"/>
    <text class="strip-label" x="32.00" y="96.00" text-anchor="start">target rate &#8712; [0.02, 0.99]</text>
    <path d="M 233.00,170.92 Q 300.00,155.88 361.00,170.92" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowhead)"/>
    <text class="merge-label" x="300.00" y="153.88" text-anchor="middle">teen → adult</text>
    <path d="M 635.00,170.92 Q 568.00,155.88 507.00,170.92" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowhead)"/>
    <text class="merge-label" x="568.00" y="153.88" text-anchor="middle">elderly → middle_aged</text>
    <rect x="712.00" y="235.94" width="56.00" height="12.06" rx="3" fill="url(#nan-hatch)" stroke="#5D7092" stroke-width="1" opacity="0.85"/>
    <text class="binlabel-rot" x="740.00" y="256.00" text-anchor="end" transform="rotate(-45 740.00 256.00)">NaN (5.9%)</text>
    <line x1="32" y1="248.00" x2="702" y2="248.00" stroke="#9ca3af" stroke-width="1"/>
    <line x1="32" y1="233.61" x2="768" y2="233.61" stroke="#ef4444" stroke-width="1" stroke-dasharray="5 3"/>
    <text class="threshold-label" x="764.00" y="229.61" text-anchor="end">min_freq = 0.07</text>
  </g>
  <g class="stage stage-2">
    <text class="title" x="400.00" y="29.00" text-anchor="middle">Stage 2 / 2 &#8212; After OrdinalDiscretizer</text>
    <rect x="658" y="12" width="110" height="22" rx="11" fill="#111827"/>
    <text class="chip" x="713.00" y="27.00" text-anchor="middle">—</text>
    <text class="callout" x="400.00" y="56.00" text-anchor="middle">3 groups, ordinal order preserved. Each merged bar spans the slots of its absorbed modalities.</text>
    <rect x="32.50" y="224.15" width="133.00" height="23.85" rx="2" fill="#5B8FF9" stroke="#374151" stroke-width="0.6"/>
    <text class="binlabel-rot" x="99.00" y="256.00" text-anchor="end" transform="rotate(-45 99.00 256.00)">child</text>
    <rect x="166.50" y="152.06" width="267.00" height="95.94" rx="2" fill="#F6BD16" stroke="#374151" stroke-width="0.6"/>
    <text class="binlabel-rot" x="300.00" y="256.00" text-anchor="end" transform="rotate(-45 300.00 256.00)">teen to adult</text>
    <rect x="434.50" y="174.27" width="267.00" height="73.73" rx="2" fill="#E8684A" stroke="#374151" stroke-width="0.6"/>
    <text class="binlabel-rot" x="568.00" y="256.00" text-anchor="end" transform="rotate(-45 568.00 256.00)">middle_aged to elderly</text>
    <path d="M 99.00,140.00 L 300.00,122.90 L 568.00,115.53" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2 3"/>
    <circle cx="99.00" cy="140.00" r="3.5" fill="#5B8FF9" stroke="#374151" stroke-width="0.6"/>
    <circle cx="300.00" cy="122.90" r="3.5" fill="#F6BD16" stroke="#374151" stroke-width="0.6"/>
    <circle cx="568.00" cy="115.53" r="3.5" fill="#E8684A" stroke="#374151" stroke-width="0.6"/>
    <text class="strip-label" x="32.00" y="96.00" text-anchor="start">target rate &#8712; [0.02, 0.99]</text>
    <rect x="712.00" y="235.94" width="56.00" height="12.06" rx="3" fill="url(#nan-hatch)" stroke="#5D7092" stroke-width="1" opacity="0.85"/>
    <text class="binlabel-rot" x="740.00" y="256.00" text-anchor="end" transform="rotate(-45 740.00 256.00)">NaN (5.9%)</text>
    <line x1="32" y1="248.00" x2="702" y2="248.00" stroke="#9ca3af" stroke-width="1"/>
    <line x1="32" y1="233.61" x2="768" y2="233.61" stroke="#ef4444" stroke-width="1" stroke-dasharray="5 3"/>
    <text class="threshold-label" x="764.00" y="229.61" text-anchor="end">min_freq = 0.07</text>
  </g>
</svg>
