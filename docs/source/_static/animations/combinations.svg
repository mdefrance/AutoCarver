@keyframes show-0 {
  0% { opacity: 1; }
  18.20% { opacity: 1; }
  20.00% { opacity: 0; }
  100% { opacity: 0; }
}
.stage-0 { opacity: 0; animation: show-0 25000ms infinite; }
@keyframes show-1 {
  0% { opacity: 0; }
  20.00% { opacity: 0; }
  21.80% { opacity: 1; }
  38.20% { opacity: 1; }
  40.00% { opacity: 0; }
  100% { opacity: 0; }
}
.stage-1 { opacity: 0; animation: show-1 25000ms infinite; }
@keyframes show-2 {
