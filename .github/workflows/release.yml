name: Release & Publish

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    environment:
      name: pypi
      url: https://pypi.org/p/autocarver/

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Tag Name
        id: extract_tag_name
        run: |
          TAG_NAME=$(grep -m1 '^version' pyproject.toml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$TAG_NAME" ]; then
            echo "No version found in pyproject.toml, skipping."
            exit 1
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_tag_name.outputs.tag_name }}
          name: Release ${{ steps.extract_tag_name.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1